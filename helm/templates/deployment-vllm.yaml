{{- if .Values.servingEngineSpec.enableEngine -}}
{{- $modelSpec := .Values.servingEngineSpec.modelSpec }}
{{- if ne $modelSpec.enabled false }}
{{- with $ }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-{{$modelSpec.name}}-deployment-vllm"
  namespace: {{ .Release.Namespace }}
  {{- with $modelSpec.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    model: {{ $modelSpec.name }}
    helm-release-name: {{ .Release.Name }}
  {{- include "chart.engineStandardLabels" (dict "releaseName" .Release.Name "modelName" $modelSpec.name "chartName" .Chart.Name) | nindent 4 }}
  {{- include "chart.engineLabels" . | nindent 4 }}
  {{- with $modelSpec.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $modelSpec.replicaCount }}
  {{- include "chart.engineStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      model: {{ $modelSpec.name }}
      helm-release-name: {{ .Release.Name }}
    {{- include "chart.engineStandardLabels" (dict "releaseName" .Release.Name "modelName" $modelSpec.name "chartName" .Chart.Name) | nindent 6 }}
    {{- include "chart.engineLabels" . | nindent 6 }}
  progressDeadlineSeconds: 1200
  template:
    metadata:
      {{- with $modelSpec.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        model: {{ $modelSpec.name }}
        helm-release-name: {{ .Release.Name }}
      {{- include "chart.engineStandardLabels" (dict "releaseName" .Release.Name "modelName" $modelSpec.name "chartName" .Chart.Name) | nindent 8 }}
      {{- include "chart.engineLabels" . | nindent 8 }}
      {{- with $modelSpec.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if $modelSpec.priorityClassName }}
      priorityClassName: {{ $modelSpec.priorityClassName | quote }}
      {{- end }}
      {{- if hasKey $modelSpec "initContainer" }}
      {{- $container := $modelSpec.initContainer }}
      initContainers:
        - name: {{ $container.name }}
          image: {{ $container.image }}
          {{- if $container.command }}
          command: {{ toYaml $container.command | nindent 12 }}
          {{- end }}
          {{- if $container.args }}
          args: {{ toYaml $container.args | nindent 12 }}
          {{- end }}
          {{- if $modelSpec.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ $modelSpec.envFromSecret.name }}
          {{- end }}
          env:
            - name: RELEASE_NAME
              value: {{ $.Release.Name }}
            {{- if $container.env }}
            {{- toYaml $container.env | nindent 12 }}
            {{- end }}
          {{- if $container.resources }}
          resources: {{ toYaml $container.resources | nindent 12 }}
          {{- end }}
          {{- $pvcMountEnabled := and (hasKey $container "mountPvcStorage") $container.mountPvcStorage (hasKey $modelSpec "pvcStorage") }}
          {{- if or $pvcMountEnabled $container.extraVolumeMounts }}
          volumeMounts:
            {{- if $pvcMountEnabled }}
            - name: {{ .Release.Name }}-storage
              mountPath: /data
            {{- end }}
            {{- with $container.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.servingEngineSpec.containerSecurityContext }}
          securityContext:
            {{- toYaml .Values.servingEngineSpec.containerSecurityContext | nindent 12 }}
          {{- end }}
      {{- end }}
      {{- if .Values.servingEngineSpec.securityContext }}
      securityContext:
        {{- toYaml .Values.servingEngineSpec.securityContext | nindent 8 }}
      {{- end }}
      {{- if hasKey $modelSpec "serviceAccountName" }}
      serviceAccountName: {{ $modelSpec.serviceAccountName }}
      {{- end }}
      hostname: "{{ $.Release.Name }}-{{ $modelSpec.name }}-{{ $.Chart.Name }}"
      subdomain: "{{ $.Release.Name }}-{{ $modelSpec.name }}-engine-service"
      containers:
        - name: "vllm"
          image: "{{ required "Required value 'modelSpec.repository' must be defined !" $modelSpec.repository }}:{{ required "Required value 'modelSpec.tag' must be defined !" $modelSpec.tag }}"
          {{- with .Values.servingEngineSpec.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
          - "vllm"
          - "serve"
          - {{ $modelSpec.modelURL | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - {{ include "chart.container-port" . | quote }}
          {{- if $modelSpec.servedModelName }}
          - "--served-model-name"
          - {{ $modelSpec.servedModelName | quote }}
          {{- end }}
          {{- if $modelSpec.enableTool }}
          - "--enable-auto-tool-choice"
          {{- end }}
          {{- if $modelSpec.toolCallParser }}
          - "--tool-call-parser"
          - {{ $modelSpec.toolCallParser | quote }}
          {{- end }}
          {{- with $modelSpec.vllmConfig }}
          {{-   if hasKey . "enableChunkedPrefill" }}
          {{-     if .enableChunkedPrefill }}
          - "--enable-chunked-prefill"
          {{-     else }}
          - "--no-enable-chunked-prefill"
          {{-     end }}
          {{-   end }}
          {{-   if .enablePrefixCaching }}
          - "--enable-prefix-caching"
          {{-   else }}
          - "--no-enable-prefix-caching"
          {{-   end }}
          {{-   if hasKey . "maxModelLen" }}
          - "--max-model-len"
          - {{ .maxModelLen | quote }}
          {{-   end }}
          {{-   if hasKey . "dtype" }}
          - "--dtype"
          - {{ .dtype | quote }}
          {{-   end }}
          {{-   if hasKey . "tensorParallelSize" }}
          - "--tensor-parallel-size"
          - {{ .tensorParallelSize | quote }}
          {{-   end }}
          {{-   if hasKey . "maxNumSeqs" }}
          - "--max-num-seqs"
          - {{ .maxNumSeqs | quote }}
          {{-   end }}
          {{-   if hasKey . "gpuMemoryUtilization" }}
          - "--gpu_memory_utilization"
          - {{ .gpuMemoryUtilization | quote }}
          {{-   end }}
          {{-   if hasKey . "runner" }}
          - "--runner"
          - {{ .runner | quote }}
          {{-   end }}
          {{-   if hasKey . "convert" }}
          - "--convert"
          - {{ .convert | quote }}
          {{-   end }}
          {{-   if .extraArgs }}
          {{-     range .extraArgs }}
          - {{ . | quote }}
          {{-     end }}
          {{-   end }}
          {{- end }}
          {{- if $modelSpec.modelRevision }}
          - "--revision"
          - {{ $modelSpec.modelRevision | quote }}
          {{- end }}
          {{- if and $modelSpec.kvEventsConfig $modelSpec.kvEventsConfig.enabled }}
          # The topic's @<model> segment salts the EPP prefix-cache hash chain and
          # MUST byte-match the EPP token-producer modelName (router.tokenizer.modelName).
          # It always follows servedModelName (the name clients call), falling back to
          # modelURL only when servedModelName is unset. Keep router.tokenizer.modelName
          # equal to servedModelName.
          - "--kv-events-config"
          - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@{{ $modelSpec.servedModelName | default $modelSpec.modelURL }}"}'
          {{- end }}
          {{- if $modelSpec.chatTemplate }}
          - "--chat-template"
          - "/templates/{{ $modelSpec.chatTemplate }}"
          {{- end }}
          imagePullPolicy: "{{ .Values.servingEngineSpec.imagePullPolicy }}"
          env:
          - name: PYTHONHASHSEED
            value: "123"
          - name: HF_HOME
            {{- if hasKey $modelSpec "pvcStorage" }}
            value: /data
            {{- else }}
            value: /tmp
            {{- end }}
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          {{- if and $modelSpec.kvEventsConfig $modelSpec.kvEventsConfig.enabled }}
          # Used in the kv-events topic (kv@$(POD_IP):$(POD_PORT)@<model>) so
          # pods are identified by their inference endpoint.
          - name: POD_PORT
            value: {{ include "chart.container-port" . | quote }}
          # Pod-discovery mode: vLLM PUBs bind per-pod so every router replica
          # can dial each pod's socket independently (required for active-active HA).
          - name: KV_EVENTS_ENDPOINT
            value: "tcp://*:{{ $modelSpec.kvEventsConfig.port | default 5556 }}"
          {{- end }}
          {{- with $modelSpec.vllmConfig}}
          {{- if and (hasKey . "v0") (eq (toString $modelSpec.vllmConfig.v0) "1") }}
          - name: VLLM_USE_V1
            value: "0"
          {{- else }}
          {{- $dir := default "/tmp" $modelSpec.vllmConfig.prometheusMultiprocDir }}
          - name: PROMETHEUS_MULTIPROC_DIR
            value: {{ $dir | quote }}
          {{- end }}
          {{- end}}
          {{- if $modelSpec.hf_token }}
          - name: HF_TOKEN
            {{- if kindIs "string" $modelSpec.hf_token }}
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-secrets
                key: hf_token_{{ $modelSpec.name }}
            {{- else }}
            valueFrom:
              secretKeyRef:
                name: {{ $modelSpec.hf_token.secretName }}
                key: {{ $modelSpec.hf_token.secretKey }}
            {{- end }}
          {{- end }}
          {{- $vllmApiKey := $.Values.servingEngineSpec.vllmApiKey }}
          {{- if $vllmApiKey }}
          {{- if kindIs "string" $vllmApiKey }}
          - name: VLLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-secrets
                key: vllmApiKey
          {{- else if and (kindIs "map" $vllmApiKey) $vllmApiKey.secretName $vllmApiKey.secretKey }}
          - name: VLLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $vllmApiKey.secretName }}
                key: {{ $vllmApiKey.secretKey }}
          {{- end }}
          {{- end }}
          {{- with .Values.servingEngineSpec.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with $modelSpec.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- if or $modelSpec.envFromSecret .Values.s3Registry.enabled }}
          envFrom:
          {{- if $modelSpec.envFromSecret }}
            - secretRef:
                name: {{ $modelSpec.envFromSecret.name }}
          {{- end }}
          {{- if .Values.s3Registry.enabled }}
            - secretRef:
                name: {{ include "chart.s3RegistrySecretName" . }}
          {{- end }}
          {{- end }}
          ports:
            - name: {{ include "chart.container-port-name" . }}
              containerPort: {{ include "chart.container-port" . }}
            {{- if and $modelSpec.kvEventsConfig $modelSpec.kvEventsConfig.enabled }}
            # Exposed so each router replica can dial the per-pod ZMQ socket
            # bound by vLLM (KV_EVENTS_ENDPOINT=tcp://*:<port>).
            - name: kv-events
              containerPort: {{ $modelSpec.kvEventsConfig.port | default 5556 }}
              protocol: TCP
            {{- end }}
          {{- include "chart.probes" . | indent 10 }}
          {{- if $modelSpec.resources }}
          resources: {{ toYaml $modelSpec.resources | nindent 12 }}
          {{- else }}
          resources: {{- include "chart.resources" $modelSpec | nindent 12 }}
          {{- end }}
          {{- if or (hasKey $modelSpec "pvcStorage") (and $modelSpec.vllmConfig (hasKey $modelSpec.vllmConfig "tensorParallelSize")) (hasKey $modelSpec "chatTemplate") (hasKey $modelSpec "extraVolumeMounts") }}
          volumeMounts:
          {{- end }}
          {{- if hasKey $modelSpec "pvcStorage" }}
          - name: {{ .Release.Name }}-storage
            mountPath: /data
          {{- end }}
          {{- with $modelSpec.vllmConfig }}
          {{- if hasKey $modelSpec.vllmConfig "tensorParallelSize"}}
          - name: shm
            mountPath: /dev/shm
          {{- end}}
          {{- end}}
          {{- if $modelSpec.chatTemplate }}
          {{- if hasKey $modelSpec "chatTemplateConfigMap" }}
          - name: {{ .Release.Name }}-{{ $modelSpec.name }}-chat-templates
            mountPath: /templates
          {{- else }}
          - name: vllm-templates
            mountPath: /templates
          {{- end }}
          {{- end }}
          {{- with $modelSpec.extraVolumeMounts }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- if $modelSpec.imagePullSecret }}
      imagePullSecrets:
        - name: {{ $modelSpec.imagePullSecret }}
      {{- end }}
      {{- if or (hasKey $modelSpec "pvcStorage") (and $modelSpec.vllmConfig (hasKey $modelSpec.vllmConfig "tensorParallelSize")) (hasKey $modelSpec "chatTemplate") (hasKey $modelSpec "extraVolumes") $modelSpec.extraVolumes }}
      volumes:
      {{- end}}
        {{- if hasKey $modelSpec "pvcStorage" }}
        - name: {{ .Release.Name }}-storage
        {{- if and (kindIs "map" $modelSpec.pvcStorage) (hasKey $modelSpec.pvcStorage "emptyDir") }}
          emptyDir:
            {{- toYaml $modelSpec.pvcStorage.emptyDir | nindent 12 }}
        {{- else if kindIs "string" $modelSpec.pvcStorage }}
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-{{$modelSpec.name}}-storage-claim"
        {{- end }}
        {{- end }}
        {{- with $modelSpec.vllmConfig }}
        {{- if hasKey $modelSpec.vllmConfig "tensorParallelSize"}}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ default "20Gi" $modelSpec.shmSize }}
        {{- end}}
        {{- end}}
        {{- if $modelSpec.chatTemplate}}
        {{- if hasKey $modelSpec "chatTemplateConfigMap" }}
        - name: {{ .Release.Name }}-{{ $modelSpec.name }}-chat-templates
          configMap:
            name: "{{ .Release.Name }}-{{$modelSpec.name}}-chat-templates"
        {{- else }}
        - name: vllm-templates
          persistentVolumeClaim:
            claimName: vllm-templates-pvc
        {{- end }}
        {{- end}}
        {{- with $modelSpec.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end}}
      {{- $globalTolerations := .Values.servingEngineSpec.tolerations | default list }}
      {{- $modelTolerations := $modelSpec.tolerations | default list }}
      {{- $tolerationsPolicy := $modelSpec.tolerationsPolicy | default "append" }}
      {{- $effectiveTolerations := $globalTolerations }}
      {{- if $modelTolerations }}
        {{- if eq $tolerationsPolicy "override" }}
          {{- $effectiveTolerations = $modelTolerations }}
        {{- else }}
          {{- $effectiveTolerations = concat $globalTolerations $modelTolerations }}
        {{- end }}
      {{- end }}
      {{- if $effectiveTolerations }}
      tolerations:
        {{- toYaml $effectiveTolerations | nindent 8 }}
      {{- end }}

      {{- with (ternary $modelSpec.runtimeClassName .Values.servingEngineSpec.runtimeClassName (hasKey $modelSpec "runtimeClassName")) }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- if .Values.servingEngineSpec.schedulerName }}
      schedulerName: {{ .Values.servingEngineSpec.schedulerName }}
      {{- end }}
      {{- if $modelSpec.nodeName }}
      nodeName: {{ $modelSpec.nodeName }}
      {{- end }}
      {{- if not (empty $modelSpec.affinity) }}
      affinity:
        {{- toYaml $modelSpec.affinity | nindent 8 }}
      {{- else if and $modelSpec.nodeSelectorTerms (not $modelSpec.nodeName) }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            {{- with $modelSpec.nodeSelectorTerms }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- end }}
{{- if and $modelSpec.chatTemplate (hasKey $modelSpec "chatTemplateConfigMap") }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-{{$modelSpec.name}}-chat-templates"
  namespace: "{{ .Release.Namespace }}"
data:
  {{ $modelSpec.chatTemplate }}: |-
{{ $modelSpec.chatTemplateConfigMap | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
