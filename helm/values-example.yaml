# Example per-release values for the vllm-stack chart.
# Copy this file, fill in the placeholders, and pass it with:
#   helm install <release> ./helm -f my-values.yaml
#
# Secrets below are placeholders — do NOT commit real credentials. Prefer
# referencing a pre-existing Kubernetes secret (s3Registry.create=false,
# s3Registry.secretName=<name>) over inlining keys here.

servingEngineSpec:
  runtimeClassName: ""
  serviceMonitor:
    enabled: true
  modelSpec:
    name: "qwen36-27b-fp8"
    enabled: true
    repository: "vllm/vllm-openai"
    tag: "v0.22.1"
    modelURL: "s3://my-models-bucket/Qwen3.6-27B-FP8"
    servedModelName: qwen36-27b-llm-d
    replicaCount: 2
    requestCPU: 8
    requestMemory: "32Gi"
    requestGPU: 1
    vllmConfig:
      enablePrefixCaching: true
      gpuMemoryUtilization: "0.9"
      extraArgs:
        - --reasoning-parser
        - qwen3
        - --enable-auto-tool-choice
        - --tool-call-parser
        - qwen3_coder
        - --kv-cache-dtype
        - fp8
        - --block-size
        - "64"
        - --disable-access-log-for-endpoints
        - /health,/metrics,/v1/models"
        - --load-format
        - runai_streamer
        - --chat-template
        - /templates/chat-template-fakezeta.jinja
    # Pull the chat template from S3 into a shared emptyDir before vLLM starts.
    # The init container reuses the S3 creds from envFromSecret (s3-registry-creds).
    envFromSecret:
      name: s3-registry-creds
    extraVolumes:
      - name: chat-template
        emptyDir: {}
    extraVolumeMounts:
      - name: chat-template
        mountPath: /templates
    initContainer:
      name: fetch-chat-template
      image: amazon/aws-cli:2.22.35
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          aws configure set default.region us-east-1
          aws configure set default.s3.addressing_style path
          aws --endpoint-url "$AWS_ENDPOINT_URL" s3 cp \
            s3://ml-inference-shared-models/Qwen3.6-27B-FP8/chat-template-fakezeta.jinja \
            /templates/chat-template-fakezeta.jinja
      extraVolumeMounts:
        - name: chat-template
          mountPath: /templates
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    env:
      - name: POD_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      - name: RUNAI_STREAMER_S3_USE_VIRTUAL_ADDRESSING
        value: "0"
      - name: AWS_EC2_METADATA_DISABLED
        value: "true"


router:
  # modelServers.matchLabels is auto-derived from the serving engine
  # (model: <modelSpec.name>) when omitted. Set it explicitly to override.
  tokenizer:
    enabled: true
    # Drives the token-producer modelName in the precise-prefix-cache config.
    modelName: Qwen/Qwen3.6-27B-FP8
    env:
    - name: VLLM_LOGGING_LEVEL
      value: DEBUG
    - name: VLLM_CPU_DISABLE_AMX
      value: "1"
    extraArgs:
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --chat-template
      - /templates/chat-template-fakezeta.jinja
      # - --load-format
      # - runai_streamer
    # Mount the shared volume populated by the EPP init container so the render
    # sidecar can read the custom chat template.
    volumeMounts:
      - name: chat-template
        mountPath: /templates
  epp:
    # Pull the chat template from S3 into a shared emptyDir before the tokenizer
    # (vllm-render sidecar) starts. The init container reuses the S3 creds from
    # the s3-registry-creds secret.
    volumes:
      - name: chat-template
        emptyDir: {}
    initContainers:
      - name: fetch-chat-template
        image: amazon/aws-cli:2.22.35
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            aws configure set default.region us-east-1
            aws configure set default.s3.addressing_style path
            aws --endpoint-url "$AWS_ENDPOINT_URL" s3 cp \
              s3://my-models-bucket/Qwen3.6-27B-FP8/chat-template-fakezeta.jinja \
              /templates/chat-template-fakezeta.jinja
        envFrom:
          - secretRef:
              name: s3-registry-creds
        volumeMounts:
          - name: chat-template
            mountPath: /templates
  monitoring:
    serviceMonitor:
      enabled: true
    prometheus:
      auth:
        enabled: false
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: llm-d-router.example.com
        paths:
          - path: /
            pathType: Prefix
s3Registry:
  enabled: true
  create: true
  # Fixed name so the initContainer envFromSecret can reference it directly.
  secretName: s3-registry-creds
  data:
    AWS_ACCESS_KEY_ID: "<your-access-key-id>"
    AWS_SECRET_ACCESS_KEY: "<your-secret-access-key>"
    AWS_ENDPOINT_URL: "https://s3.example.com:7480"
