name: Publish Helm Chart

# Lint the chart on pull requests, and package + push it to GHCR as an OCI
# artifact when a chart tag (chart-v*) is pushed.
on:
  push:
    tags:
      - 'v*'
      - 'pre-v*'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/publish-helm.yaml'

env:
  CHART_DIR: helm
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Update dependencies
        run: helm dependency update ${{ env.CHART_DIR }}

      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}

      - name: Template chart
        run: helm template ${{ env.CHART_DIR }}

  publish:
    name: Package and push chart
    runs-on: ubuntu-latest
    # Only publish on release tag pushes.
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/pre-v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Update dependencies
        run: helm dependency update ${{ env.CHART_DIR }}

      - name: Derive chart version from tag
        id: version
        run: |
          # Strip a leading "v" or "pre-v" from the tag to get a SemVer version.
          version="${GITHUB_REF_NAME#pre-}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_DIR }} \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination ./dist
          echo "package=$(ls ./dist/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        run: |
          helm push "${{ steps.package.outputs.package }}" \
            "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"
