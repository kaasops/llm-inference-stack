name: Publish Helm Chart

# Lint the chart on pull requests, and package + push it to GHCR as an OCI
# artifact when a chart tag (chart-v*) is pushed.
on:
  push:
    tags:
      - 'v*'
      - 'pre-v*'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/publish-helm.yaml'

env:
  CHART_DIR: helm
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Update dependencies
        run: helm dependency update ${{ env.CHART_DIR }}

      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}

      - name: Template chart
        run: helm template ${{ env.CHART_DIR }}

  publish:
    name: Package and push chart
    runs-on: ubuntu-latest
    # Only publish on chart tag pushes.
    if: startsWith(github.ref, 'refs/tags/chart-v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Update dependencies
        run: helm dependency update ${{ env.CHART_DIR }}

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_DIR }} --destination ./dist
          echo "package=$(ls ./dist/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        run: |
          helm push "${{ steps.package.outputs.package }}" \
            "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"
